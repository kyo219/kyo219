name: Update contributions

on:
  schedule:
    - cron: "0 21 * * *" # daily, 06:00 JST
  workflow_dispatch:
  push:
    branches: [main]
    paths: [scripts/update_contributions.py]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate README sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_contributions.py
      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update contributions section"
          git push
